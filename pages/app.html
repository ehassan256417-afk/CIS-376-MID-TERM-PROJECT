<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App</title>
<!-- Bootstrap CSS library (for layout & components) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../styles/main.css" rel="stylesheet">
</head>
<!-- Note: This page is protected and requires login. The auth.js script will check for a valid session and redirect to login if not authenticated. -->
<!-- The app.js script will handle loading and displaying the content data, as well as the search, filter, and sort functionality. -->
<!-- The main.js script contains shared utility functions used across multiple pages, such as session management and DOM manipulation helpers. -->
<body class="container py-4">
<!-- The header section contains the page title, a brief description, and navigation buttons. -->
  <header class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="fw-bold m-0">App</h1>
       <i class="bi bi-collection-fill me-2"></i> Content Explorer
      <p class="text-muted m-0">Protected page — requires login.</p>
    </div>
<!-- The navigation buttons on the right allow users to go back to the home page, view session data, or log out. The logout button will clear the session and redirect to the login page. -->
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="../index.html">Home</a>
      <a class="btn btn-outline-info" href="./data.html">View Session Data</a>
      <button id="btnLogout" class="btn btn-danger" type="button">
  <i class="bi bi-box-arrow-right"></i> Logout
</button>
    </div>
  </header>
<!-- The main section contains the user information, view toggle buttons, search and filter controls, and the grid where the content cards will be displayed. The app.js script will populate this section with dynamic content based on the data loaded from the content.json file. -->
  <main>
    <div class="alert alert-success">
      You are logged in as: <strong id="whoami">...</strong>
    </div>

    <!-- View toggle + result count --> <!-- The view toggle buttons allow users to switch between grid and list views for the content cards. The result count will display the number of items currently shown based on the search and filter criteria. -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="btn-group" role="group">
        <button id="gridViewBtn" class="btn btn-outline-secondary active" type="button">Grid</button>
        <button id="listViewBtn" class="btn btn-outline-secondary" type="button">List</button>
      </div>
      <small class="text-muted" id="resultCount">0 items</small>
    </div>

    <!-- Search + Filter + Sort --> <!-- The search input allows users to filter the content cards by title or description. The category filter dropdown will be populated dynamically based on the categories present in the content data, allowing users to filter by category. The sort dropdown provides options to sort the content by rating or title in ascending or descending order. -->
    <div class="row g-2 mb-3">
      <div class="col-md-6">
        <input id="searchInput" class="form-control" type="search" placeholder="Search title or description...">
      </div>

      <!-- The category filter will be populated dynamically based on the categories present in the content data. It allows users to filter the displayed content by category, showing only items that match the selected category or all items if "All categories" is selected. -->
      <div class="col-md-3">
        <select id="categoryFilter" class="form-select">
          <option value="all">All categories</option>
        </select>
      </div>

      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="rating-desc">Sort: rating (high → low)</option>
          <option value="rating-asc">Sort: rating (low → high)</option>
          <option value="title-asc">Sort: title (A → Z)</option>
          <option value="title-desc">Sort: title (Z → A)</option>
        </select>
      </div>
    </div>

    <!-- Cards -->
     <!-- The card grid is where the content cards will be displayed. Each card will show the title, category, rating, description, and a link to the resource. The app.js script will generate these cards dynamically based on the content data and the current search, filter, and sort criteria. -->
    <div class="row g-3" id="cardGrid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 <!-- <!The auth.js script will check for a valid session on page load and redirect to the login page if the user is not authenticated. It also provides functions for logging out and managing session data. -->
<!-- <! The main.js script contains shared utility functions used across multiple pages, such as session management and -->
  <!-- Only once (no duplicates) -->
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/app.js"></script>

</body>
</html>
