<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../styles/main.css" rel="stylesheet">
</head>

<body class="container py-4">

  <header class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="fw-bold m-0">App</h1>
      <p class="text-muted m-0">Protected page — requires login.</p>
    </div>

    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="../index.html">Home</a>
      <a class="btn btn-outline-info" href="./data.html">View Session Data</a>
      <button id="btnLogout" class="btn btn-danger" type="button">
  <i class="bi bi-box-arrow-right"></i> Logout
</button>
    </div>
  </header>

  <main>
    <div class="alert alert-success">
      ✅ You are logged in as: <strong id="whoami">...</strong>
    </div>

    <!-- View toggle + result count -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="btn-group" role="group">
        <button id="gridViewBtn" class="btn btn-outline-secondary active" type="button">Grid</button>
        <button id="listViewBtn" class="btn btn-outline-secondary" type="button">List</button>
      </div>
      <small class="text-muted" id="resultCount">0 items</small>
    </div>

    <!-- Search + Filter + Sort -->
    <div class="row g-2 mb-3">
      <div class="col-md-6">
        <input id="searchInput" class="form-control" type="search" placeholder="Search title or description...">
      </div>

      <div class="col-md-3">
        <select id="categoryFilter" class="form-select">
          <option value="all">All categories</option>
        </select>
      </div>

      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="rating-desc">Sort: rating (high → low)</option>
          <option value="rating-asc">Sort: rating (low → high)</option>
          <option value="title-asc">Sort: title (A → Z)</option>
          <option value="title-desc">Sort: title (Z → A)</option>
        </select>
      </div>
    </div>

    <!-- Cards -->
    <div class="row g-3" id="cardGrid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Only once (no duplicates) -->
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/app.js"></script>

</body>
</html>
